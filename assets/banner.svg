<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>

    <!-- Theme Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Styles & Keyframe Animations */
    .title-text {
      font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 64px;
      fill: url(#primaryGrad);
    }
    
    .subtitle-text {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 500;
      font-size: 20px;
      fill: #9ca3af;
      letter-spacing: 4px;
    }

    /* Grid & Decorative Line Animations */
    .grid-lines {
      stroke: #1f2937;
      stroke-width: 1;
      opacity: 0.4;
    }

    /* Pulse/Signal animation for connections */
    @keyframes pulse {
      0% {
        stroke-dashoffset: 24;
        opacity: 0.4;
      }
      50% {
        opacity: 1;
      }
      100% {
        stroke-dashoffset: 0;
        opacity: 0.4;
      }
    }

    .pulse-line {
      stroke: url(#primaryGrad);
      stroke-width: 2.5;
      stroke-dasharray: 8 16;
      animation: pulse 4s linear infinite;
    }

    .pulse-line-reverse {
      stroke: url(#accentGrad);
      stroke-width: 2;
      stroke-dasharray: 6 12;
      animation: pulse 6s linear infinite reverse;
    }

    /* Node hover/floating animation */
    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes float-delayed {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(8px);
      }
    }

    .float-group-1 {
      animation: float 5s ease-in-out infinite;
    }

    .float-group-2 {
      animation: float-delayed 6s ease-in-out infinite;
    }

    /* Orb pulsing glow */
    @keyframes orbGlow {
      0%, 100% {
        opacity: 0.4;
      }
      50% {
        opacity: 1;
      }
    }

    .glow-node {
      fill: #8b5cf6;
      animation: orbGlow 3s ease-in-out infinite;
    }

    .glow-node-accent {
      fill: #10b981;
      animation: orbGlow 4s ease-in-out infinite;
    }

    .glow-node-pink {
      fill: #ec4899;
      animation: orbGlow 3.5s ease-in-out infinite;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Grid Pattern (Dynamic aesthetic) -->
  <g class="grid-lines">
    <!-- Horizontal lines -->
    <line x1="0" y1="50" x2="1200" y2="50" />
    <line x1="0" y1="150" x2="1200" y2="150" />
    <line x1="0" y1="250" x2="1200" y2="250" />
    <line x1="0" y1="350" x2="1200" y2="350" />
    <!-- Vertical lines -->
    <line x1="150" y1="0" x2="150" y2="400" />
    <line x1="350" y1="0" x2="350" y2="400" />
    <line x1="550" y1="0" x2="550" y2="400" />
    <line x1="750" y1="0" x2="750" y2="400" />
    <line x1="950" y1="0" x2="950" y2="400" />
    <line x1="1150" y1="0" x2="1150" y2="400" />
  </g>

  <!-- Background Decorative Circles with Blur -->
  <circle cx="1050" cy="100" r="120" fill="#3b82f6" opacity="0.15" filter="url(#glow)" />
  <circle cx="150" cy="300" r="150" fill="#ec4899" opacity="0.1" filter="url(#glow)" />

  <!-- Animated Connections (RL Policy Graph Representation) -->
  <g opacity="0.8">
    <!-- Connections -->
    <path d="M 150 200 L 300 120" stroke="#1f2937" stroke-width="2" />
    <path d="M 150 200 L 300 280" stroke="#1f2937" stroke-width="2" />
    <path d="M 300 120 L 480 200" stroke="#1f2937" stroke-width="2" />
    <path d="M 300 280 L 480 200" stroke="#1f2937" stroke-width="2" />
    
    <path d="M 720 200 L 900 120" stroke="#1f2937" stroke-width="2" />
    <path d="M 720 200 L 900 280" stroke="#1f2937" stroke-width="2" />
    <path d="M 900 120 L 1050 200" stroke="#1f2937" stroke-width="2" />
    <path d="M 900 280 L 1050 200" stroke="#1f2937" stroke-width="2" />

    <!-- Animated Signals (Pulses) -->
    <path d="M 150 200 L 300 120" class="pulse-line" />
    <path d="M 150 200 L 300 280" class="pulse-line-reverse" />
    <path d="M 300 120 L 480 200" class="pulse-line-reverse" />
    <path d="M 300 280 L 480 200" class="pulse-line" />
    
    <path d="M 720 200 L 900 120" class="pulse-line-reverse" />
    <path d="M 720 200 L 900 280" class="pulse-line" />
    <path d="M 900 120 L 1050 200" class="pulse-line" />
    <path d="M 900 280 L 1050 200" class="pulse-line-reverse" />
  </g>

  <!-- Interactive Nodes (State/Action representations) -->
  <!-- Left Node Group -->
  <g class="float-group-1">
    <circle cx="150" cy="200" r="16" fill="#111827" stroke="#3b82f6" stroke-width="3" />
    <circle cx="150" cy="200" r="6" class="glow-node" />
    
    <circle cx="300" cy="120" r="14" fill="#111827" stroke="#8b5cf6" stroke-width="3" />
    <circle cx="300" cy="120" r="5" class="glow-node-pink" />

    <circle cx="300" cy="280" r="14" fill="#111827" stroke="#10b981" stroke-width="3" />
    <circle cx="300" cy="280" r="5" class="glow-node-accent" />
    
    <circle cx="480" cy="200" r="18" fill="#111827" stroke="#ec4899" stroke-width="3" />
    <circle cx="480" cy="200" r="7" class="glow-node-pink" />
  </g>

  <!-- Right Node Group -->
  <g class="float-group-2">
    <circle cx="720" cy="200" r="18" fill="#111827" stroke="#3b82f6" stroke-width="3" />
    <circle cx="720" cy="200" r="7" class="glow-node" />
    
    <circle cx="900" cy="120" r="14" fill="#111827" stroke="#10b981" stroke-width="3" />
    <circle cx="900" cy="120" r="5" class="glow-node-accent" />

    <circle cx="900" cy="280" r="14" fill="#111827" stroke="#8b5cf6" stroke-width="3" />
    <circle cx="900" cy="280" r="5" class="glow-node-pink" />
    
    <circle cx="1050" cy="200" r="16" fill="#111827" stroke="#ec4899" stroke-width="3" />
    <circle cx="1050" cy="200" r="6" class="glow-node" />
  </g>

  <!-- Central Typography (Main Banner Info) -->
  <g transform="translate(600, 190)" text-anchor="middle">
    <!-- Awesome Q-Learning Title -->
    <text class="title-text" y="0">AWESOME Q-LEARNING</text>
    <!-- Subtitle / Tagline -->
    <text class="subtitle-text" y="55">THE VALUE-BASED RL MAP</text>
  </g>

  <!-- Tech Symbols / Equation Glyphs (Floating subtly in corners) -->
  <g class="float-group-1" opacity="0.3" fill="#ffffff" font-family="Courier, monospace" font-size="22">
    <text x="80" y="80">Q(s, a)</text>
    <text x="1000" y="320">r + &#947; max Q</text>
  </g>
  <g class="float-group-2" opacity="0.3" fill="#ffffff" font-family="Courier, monospace" font-size="22">
    <text x="1000" y="80">&#960;(a|s)</text>
    <text x="120" y="320">TD Error</text>
  </g>
</svg>
