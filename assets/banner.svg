<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>

    <!-- Theme Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Grid Pattern (Dynamic aesthetic) -->
  <g stroke="#1f2937" stroke-width="1" opacity="0.4">
    <!-- Horizontal lines -->
    <line x1="0" y1="50" x2="1200" y2="50" />
    <line x1="0" y1="150" x2="1200" y2="150" />
    <line x1="0" y1="250" x2="1200" y2="250" />
    <line x1="0" y1="350" x2="1200" y2="350" />
    <!-- Vertical lines -->
    <line x1="150" y1="0" x2="150" y2="400" />
    <line x1="350" y1="0" x2="350" y2="400" />
    <line x1="550" y1="0" x2="550" y2="400" />
    <line x1="750" y1="0" x2="750" y2="400" />
    <line x1="950" y1="0" x2="950" y2="400" />
    <line x1="1150" y1="0" x2="1150" y2="400" />
  </g>

  <!-- Background Decorative Circles with Blur -->
  <circle cx="1050" cy="100" r="120" fill="#3b82f6" opacity="0.15" filter="url(#glow)" />
  <circle cx="150" cy="300" r="150" fill="#ec4899" opacity="0.1" filter="url(#glow)" />

  <!-- Policy Graph Connections -->
  <g opacity="0.8">
    <!-- Connections -->
    <path d="M 150 200 L 300 120" stroke="#1f2937" stroke-width="2" />
    <path d="M 150 200 L 300 280" stroke="#1f2937" stroke-width="2" />
    <path d="M 300 120 L 480 200" stroke="#1f2937" stroke-width="2" />
    <path d="M 300 280 L 480 200" stroke="#1f2937" stroke-width="2" />
    
    <path d="M 720 200 L 900 120" stroke="#1f2937" stroke-width="2" />
    <path d="M 720 200 L 900 280" stroke="#1f2937" stroke-width="2" />
    <path d="M 900 120 L 1050 200" stroke="#1f2937" stroke-width="2" />
    <path d="M 900 280 L 1050 200" stroke="#1f2937" stroke-width="2" />

    <!-- Colored Active Flow Lines -->
    <path d="M 150 200 L 300 120" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-dasharray="6 6" />
    <path d="M 150 200 L 300 280" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="4 4" />
    <path d="M 300 120 L 480 200" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="4 4" />
    <path d="M 300 280 L 480 200" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-dasharray="6 6" />
    
    <path d="M 720 200 L 900 120" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="4 4" />
    <path d="M 720 200 L 900 280" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-dasharray="6 6" />
    <path d="M 900 120 L 1050 200" stroke="url(#primaryGrad)" stroke-width="2.5" stroke-dasharray="6 6" />
    <path d="M 900 280 L 1050 200" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="4 4" />
  </g>

  <!-- Interactive Nodes (State/Action representations) -->
  <!-- Left Node Group -->
  <g>
    <circle cx="150" cy="200" r="16" fill="#111827" stroke="#3b82f6" stroke-width="3" />
    <circle cx="150" cy="200" r="6" fill="#8b5cf6" />
    
    <circle cx="300" cy="120" r="14" fill="#111827" stroke="#8b5cf6" stroke-width="3" />
    <circle cx="300" cy="120" r="5" fill="#ec4899" />

    <circle cx="300" cy="280" r="14" fill="#111827" stroke="#10b981" stroke-width="3" />
    <circle cx="300" cy="280" r="5" fill="#10b981" />
    
    <circle cx="480" cy="200" r="18" fill="#111827" stroke="#ec4899" stroke-width="3" />
    <circle cx="480" cy="200" r="7" fill="#ec4899" />
  </g>

  <!-- Right Node Group -->
  <g>
    <circle cx="720" cy="200" r="18" fill="#111827" stroke="#3b82f6" stroke-width="3" />
    <circle cx="720" cy="200" r="7" fill="#8b5cf6" />
    
    <circle cx="900" cy="120" r="14" fill="#111827" stroke="#10b981" stroke-width="3" />
    <circle cx="900" cy="120" r="5" fill="#10b981" />

    <circle cx="900" cy="280" r="14" fill="#111827" stroke="#8b5cf6" stroke-width="3" />
    <circle cx="900" cy="280" r="5" fill="#ec4899" />
    
    <circle cx="1050" cy="200" r="16" fill="#111827" stroke="#ec4899" stroke-width="3" />
    <circle cx="1050" cy="200" r="6" fill="#8b5cf6" />
  </g>

  <!-- Central Typography (Main Banner Info) -->
  <g transform="translate(600, 190)" text-anchor="middle">
    <!-- Awesome Q-Learning Title -->
    <text y="0" fill="url(#primaryGrad)" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="64">AWESOME Q-LEARNING</text>
    <!-- Subtitle / Tagline -->
    <text y="55" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="20" style="letter-spacing: 4px;">THE VALUE-BASED RL MAP</text>
  </g>

  <!-- Tech Symbols / Equation Glyphs (Floating subtly in corners) -->
  <g opacity="0.3" fill="#ffffff" font-family="Courier, monospace" font-size="22">
    <text x="80" y="80">Q(s, a)</text>
    <text x="1000" y="320">r + &#947; max Q</text>
  </g>
  <g opacity="0.3" fill="#ffffff" font-family="Courier, monospace" font-size="22">
    <text x="1000" y="80">&#960;(a|s)</text>
    <text x="120" y="320">TD Error</text>
  </g>
</svg>
